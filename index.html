<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Keychain Designer</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>

  <style>
    body {
      text-align: center;
      font-family: Arial;
    }

    canvas {
      border: 2px solid #ccc;
      margin-top: 20px;
    }

    img {
      width: 80px;
      cursor: pointer;
      margin: 10px;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
    }
  </style>
</head>

<body>

  <h2>Design your keychain 🎀</h2>

  <!-- Sticker -->
  <div>
    <img src="https://i.imgur.com/6X4K7kF.png" onclick="addSticker(this)">
  </div>

  <!-- Canvas -->
  <canvas id="c" width="500" height="500"></canvas>

  <br>

  <button onclick="download()">Download</button>
  <button onclick="deleteObject()">Delete</button>

  <script>
    const canvas = new fabric.Canvas('c');

    // khung móc khóa
    const rect = new fabric.Rect({
      left: 50,
      top: 50,
      width: 400,
      height: 400,
      fill: 'transparent',
      stroke: 'pink',
      selectable: false
    });
    canvas.add(rect);

    function addSticker(img) {
      fabric.Image.fromURL(img.src, function(oImg) {
        oImg.set({
          left: 100,
          top: 100,
          scaleX: 0.3,
          scaleY: 0.3
        });
        canvas.add(oImg);
      });
    }

    function download() {
      const dataURL = canvas.toDataURL({
        format: 'png',
        quality: 1
      });

      const link = document.createElement('a');
      link.href = dataURL;
      link.download = 'design.png';
      link.click();
    }

    function deleteObject() {
      const obj = canvas.getActiveObject();
      if (obj) {
        canvas.remove(obj);
      }
    }
  </script>

</body>
</html>
